name: quizai
base: core22
version: '1.0.0'
summary: AI-powered quiz generator from your documents
description: |
  QuizAI lets you upload documents (PDF, DOCX, TXT) or paste text,
  then automatically generates quizzes using OpenAI.
  Supports multiple choice, true/false, and fill-in-the-blank questions.
  Includes automatic grading and detailed result feedback.

grade: stable
confinement: strict

architectures:
  - build-on: amd64

apps:
  quizai:
    command: bin/QuizAI.Desktop
    extensions: [gnome]
    environment:
      DOTNET_ROOT: $SNAP/usr/share/dotnet
      PATH: $SNAP/usr/share/dotnet:$PATH
    plugs:
      - network
      - home
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - audio-playback

parts:
  quizai-desktop:
    plugin: nil
    source: .
    build-packages:
      - wget
      - ca-certificates
    override-build: |
      set -e

      # Install .NET 8 SDK
      wget -q https://dot.net/v1/dotnet-install.sh -O dotnet-install.sh
      chmod +x dotnet-install.sh
      ./dotnet-install.sh --channel 8.0 --install-dir /tmp/dotnet

      # Publish self-contained
      /tmp/dotnet/dotnet publish QuizAI.Desktop/QuizAI.Desktop.csproj \
        -c Release \
        -r linux-x64 \
        --self-contained true \
        -p:PublishSingleFile=true \
        -p:PublishTrimmed=false \
        -o $SNAPCRAFT_PART_INSTALL/bin

    stage-packages:
      - libfontconfig1
      - libfreetype6
      - libx11-6
      - libxext6
      - libxrender1
      - libxrandr2
      - libxi6
      - libxcursor1
      - libxdamage1
      - libxcomposite1
      - libxfixes3
      - libc6
      - libstdc++6
      - libgcc-s1
      - zlib1g
      - libssl3
      - libicu70

  desktop-file:
    plugin: dump
    source: snap/local
    organize:
      quizai.desktop: usr/share/applications/quizai.desktop
      quizai.png: usr/share/icons/hicolor/256x256/apps/quizai.png
