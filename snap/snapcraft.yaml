name: quizai
title: QuizAI
summary: AI-powered quiz generation app
description: |
  QuizAI is a desktop application that uses AI to generate quizzes from documents.
  Simply paste text, upload a file, or import from URL - QuizAI creates quizzes instantly.
  
  Features:
  - Generate quizzes from any text or document
  - Import from URLs (Wikipedia, articles, etc.)
  - Multiple choice questions with instant grading
  - Track your quiz history and scores
  - Modern, intuitive interface

version: "1.0.1"
grade: stable
confinement: strict
base: core22
contact: thangenz0507@gmail.com
license: MIT
adopt-info: quizai

parts:
  quizai:
    plugin: dump
    source: ./publish/desktop-linux-x64/
    override-build: |
      cp -r $SNAPCRAFT_PART_SRC/* $SNAPCRAFT_PART_INSTALL/ || true
      chmod +x $SNAPCRAFT_PART_INSTALL/QuizAI.Desktop 2>/dev/null || true
    stage:
      - -*.pdb

apps:
  quizai:
    command: QuizAI.Desktop
    plugs:
      - network
      - home
      - removable-media
